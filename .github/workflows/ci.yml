name: React CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Linter
      run: npm run lint || echo "Linting failed, but continuing..."

    - name: Run Unit Tests
      run: npm run test -- --run

    - name: Build Project
      run: npm run build

    - name: Trigger Selenium Tests
      if: success() # тільки якщо білд і юніт-тести пройшли успішно1
      run: |
        curl -X POST \
        -H "Accept: application/vnd.github.v3+json" \
        -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
        https://api.github.com/repos/gykmiha8/qa-lab4/dispatches \
        -d '{"event_type": "trigger_selenium"}'